[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions.api]
  node_bundler = "none"
  included_files = ["netlify/functions/sql-wasm.wasm"]

# API → 自包含打包函数 api.cjs（build 时生成）
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
